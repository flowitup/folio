services:
  # ── Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./folio-back-end
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      # All secret-bearing values are REQUIRED (`${VAR:?required}`) — compose
      # refuses to start without them. Dev defaults live in
      # docker-compose.dev.yml. Prod values come from /opt/folio/.env rendered
      # from Secret Manager. This prevents an accidental
      # `docker compose -f docker-compose.yml up` on the VM from booting with
      # known credentials or a forgeable JWT signing key.
      - DATABASE_URL=postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:?required}
      - SECRET_KEY=${SECRET_KEY:?required}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:?required}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:?required}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:?required}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:?required}
      - S3_SECRET_KEY=${S3_SECRET_KEY:?required}
      - S3_BUCKET=${S3_BUCKET:?required}
      - S3_REGION=${S3_REGION:?required}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ./folio-back-end
      dockerfile: Dockerfile
    command: python -m stack.queue.rq_worker
    # Worker has no HTTP port — disable the inherited Dockerfile HEALTHCHECK
    # (which curls localhost:5000/health and gets connection refused on the worker).
    # RQ has no built-in healthcheck endpoint; container "running" is sufficient.
    healthcheck:
      disable: true
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:?required}
      - SECRET_KEY=${SECRET_KEY:?required}
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:?required}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?required}
      - POSTGRES_DB=${POSTGRES_DB:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Loopback-only bind: even if a future firewall slip publishes the VM
    # external IP, Postgres is not reachable. Dev devs can still reach via
    # 127.0.0.1:5432 from the host. Prod overlay drops the port entirely.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?required}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Loopback-only bind — same reasoning as db.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:?required}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:?required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./folio-front-end
      dockerfile: Dockerfile
      args:
        # Baked at build time — used by browser (client-side) requests.
        # Required: NEXT_PUBLIC_* values are inlined into the public JS bundle,
        # so a missing/wrong value would silently ship an unusable build.
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:?required}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Runtime-only — used by server actions inside the container (Docker internal network)
      - API_INTERNAL_BASE_URL=${API_INTERNAL_BASE_URL:?required}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  minio_data:
