# Production override — applied on top of docker-compose.yml.
#
# Usage on the VM:
#   cd /opt/folio
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this changes:
#  1. All published ports bound to 127.0.0.1 only (cloudflared reaches them via
#     loopback). No 0.0.0.0 exposure even if the firewall slips. Red-team #10.
#  2. db/redis ports REMOVED — only Docker network access from api/worker.
#  3. Credential env vars use ${VAR:?required} → compose ABORTS if any is unset.
#     Defeats the dev-friendly :-default fallbacks that would otherwise leak
#     to prod. Red-team #4.
#  4. FLASK_DEBUG forced to false.
#
# Compose merge tags used:
#   !reset []     — clears the inherited list (db/redis ports)
#   !override     — replaces the inherited list (other services' ports)
# Both require Docker Compose v2.20+.

services:
  api:
    # Pull from Artifact Registry; CI pins ${IMAGE_TAG} per-deploy (SHA), falls
    # back to :latest for ad-hoc `docker compose pull`. Base compose's `build:`
    # is ignored when `image:` resolves locally — dev still works unchanged.
    image: europe-west1-docker.pkg.dev/flowitup-folio-prod/folio/api:${IMAGE_TAG:-latest}
    pull_policy: always
    ports: !override
      - "127.0.0.1:5000:5000"
    environment:
      - "DATABASE_URL=postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:?required}"
      - "SECRET_KEY=${SECRET_KEY:?required}"
      - "JWT_SECRET_KEY=${JWT_SECRET_KEY:?required}"
      - "REDIS_URL=redis://redis:6379/0"
      - "CORS_ORIGINS=${CORS_ORIGINS:?required}"
      - "EMAIL_PROVIDER=${EMAIL_PROVIDER:?required}"
      - "RESEND_API_KEY=${RESEND_API_KEY:?required}"
      - "RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:?required}"
      # Back-end's wiring.py reads FROM_EMAIL (not RESEND_FROM_EMAIL).
      # Aliased here until the env-var name is unified across phases.
      - "FROM_EMAIL=${RESEND_FROM_EMAIL:?required}"
      - "FLASK_DEBUG=false"
      - "S3_ENDPOINT_URL=${S3_ENDPOINT_URL:?required}"
      - "S3_ACCESS_KEY=${S3_ACCESS_KEY:?required}"
      - "S3_SECRET_KEY=${S3_SECRET_KEY:?required}"
      - "S3_BUCKET=${S3_BUCKET:?required}"
      - "S3_REGION=${S3_REGION:?required}"

  worker:
    # Shared with api (Y5 — single Dockerfile, different command). Same SHA.
    image: europe-west1-docker.pkg.dev/flowitup-folio-prod/folio/api:${IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      - "DATABASE_URL=postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:?required}"
      - "SECRET_KEY=${SECRET_KEY:?required}"
      - "JWT_SECRET_KEY=${JWT_SECRET_KEY:?required}"
      - "REDIS_URL=redis://redis:6379/0"
      - "EMAIL_PROVIDER=${EMAIL_PROVIDER:?required}"
      - "RESEND_API_KEY=${RESEND_API_KEY:?required}"
      - "RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:?required}"
      - "FROM_EMAIL=${RESEND_FROM_EMAIL:?required}"

  db:
    ports: !reset []
    environment:
      - "POSTGRES_USER=${POSTGRES_USER:?required}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?required}"
      - "POSTGRES_DB=${POSTGRES_DB:?required}"

  redis:
    ports: !reset []

  minio:
    ports: !override
      - "127.0.0.1:9000:9000"   # S3 API — reached by cloudflared / SSH-tunnel only
      - "127.0.0.1:9001:9001"   # console — admin via SSH port-forward only
    environment:
      - "MINIO_ROOT_USER=${S3_ACCESS_KEY:?required}"
      - "MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:?required}"

  frontend:
    image: europe-west1-docker.pkg.dev/flowitup-folio-prod/folio/frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports: !override
      - "127.0.0.1:3000:3000"
    environment:
      - "NODE_ENV=production"
      - "API_INTERNAL_BASE_URL=${API_INTERNAL_BASE_URL:?required}"
