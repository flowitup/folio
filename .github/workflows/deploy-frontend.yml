# Deploy frontend (Next.js standalone) to prod VM.
#
# Triggered by:
#   - repository_dispatch (event_type: deploy-frontend) from folio-front-end's
#     release job after it tags a new version.
#   - workflow_dispatch with explicit version + sha (manual fallback).
#
# Flow: checkout submodule@<sha> → buildx with NEXT_PUBLIC_API_BASE_URL baked
#   → push to AR (tag <sha> + latest) → gcloud IAP SSH →
#   /opt/folio/scripts/deploy-runner.sh <sha> frontend → CF cache purge →
#   smoke / (follows next-intl locale redirect) → (separate job) submodule
#   pointer bump.
#
# Note: NEXT_PUBLIC_* envs are baked into the JS bundle at build time. If the
# prod domain ever changes, all FE images need rebuilding.
#
# Permission model: see deploy-backend.yml. Build runs untrusted submodule
# source under contents:read; bump-pointer is a separate job with
# contents:write that runs only after build succeeds.
#
# Plan: plans/260503-0913-parent-auto-deploy-on-version-bump/phase-02-...md
# Runbook: docs/deployment-guide.md §3.1, §4.1

name: Deploy Frontend

on:
  repository_dispatch:
    types: [deploy-frontend]
  workflow_dispatch:
    inputs:
      version:
        description: "Frontend version (e.g. 1.2.3)"
        required: true
        type: string
      sha:
        description: "folio-front-end commit SHA (7-40 hex)"
        required: true
        type: string

concurrency:
  group: deploy-prod-frontend
  cancel-in-progress: false

env:
  PROJECT_ID: flowitup-folio-prod
  REGION: europe-west1
  AR_REPO: folio
  IMAGE_NAME: frontend
  VM_NAME: flowitup-folio-prod-1
  ZONE: europe-west1-b
  PROD_DOMAIN: folio.flowitup.com
  SUBMODULE_REPO: flowitup/folio-front-end
  SUBMODULE_PATH: folio-front-end

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Build job is read-only on parent contents. See deploy-backend.yml for
    # the rationale: a build-time exfil of GITHUB_TOKEN must not be able to
    # push to parent master.
    permissions:
      contents: read
      id-token: write
    outputs:
      sha: ${{ steps.input.outputs.sha }}
      version: ${{ steps.input.outputs.version }}
    steps:
      - name: Resolve inputs (dispatch vs manual)
        id: input
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            SHA="${{ github.event.client_payload.sha }}"
          else
            VERSION="${{ inputs.version }}"
            SHA="${{ inputs.sha }}"
          fi
          [[ "$SHA" =~ ^[0-9a-f]{7,40}$ ]] || { echo "::error::invalid sha '$SHA'"; exit 1; }
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::invalid version '$VERSION'"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::deploying frontend v$VERSION (sha $SHA)"

      - name: Checkout parent (for deploy scripts + compose files)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout folio-front-end at SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ env.SUBMODULE_REPO }}
          ref: ${{ steps.input.outputs.sha }}
          path: src-fe
          persist-credentials: false
          # SUBMODULE_TOKEN is REQUIRED when the sibling repo is private —
          # GITHUB_TOKEN cannot read other private repos in the org.
          token: ${{ secrets.SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-tags: true

      - name: Verify version↔sha tag
        # Resolve the tag via the GitHub REST API and ensure the version in
        # the payload actually points at the SHA being deployed. Runs on
        # BOTH triggers: a leaked `repository_dispatch` token could otherwise
        # invoke a deploy with an attacker-chosen SHA from any internal
        # branch (the SHA-regex allows any 7-40 hex string, including ones
        # that never made it to a signed release tag).
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${{ steps.input.outputs.version }}"
          SHA="${{ steps.input.outputs.sha }}"
          tag_sha=$(gh api "repos/${{ env.SUBMODULE_REPO }}/commits/v${VERSION}" --jq .sha 2>/dev/null || true)
          if [ -z "$tag_sha" ]; then
            echo "::error::tag v${VERSION} does not exist on ${{ env.SUBMODULE_REPO }}"
            exit 1
          fi
          if [ "$tag_sha" = "$SHA" ] || [[ "$SHA" == "$tag_sha"* ]] || [[ "$tag_sha" == "$SHA"* ]]; then
            echo "::notice::tag v${VERSION} points at ${SHA} ✓ (resolved $tag_sha)"
          else
            echo "::error::tag v${VERSION} points at ${tag_sha} but caller passed ${SHA}"
            exit 1
          fi

      - id: auth
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f  # v2.1.7
        with:
          # Workload Identity Federation — keyless auth via GitHub OIDC token.
          # Org policy `iam.disableServiceAccountKeyCreation` blocks JSON keys.
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a  # v2.1.4

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.7.1

      - name: Guard against NEXT_PUBLIC_* secrets
        # Next.js inlines every `NEXT_PUBLIC_*` env var into the public JS
        # bundle at build time. A name like `NEXT_PUBLIC_SENTRY_KEY` looks
        # innocent but ships the value to every browser and gets scraped
        # off the CDN within hours. Fail the build before push if any
        # NEXT_PUBLIC_* env name suggests a secret.
        run: |
          if git -C src-fe grep -rIE 'NEXT_PUBLIC_[A-Z0-9_]*(SECRET|KEY|TOKEN|PASSWORD)' \
              -- 'src/' ':!*.test.*' ':!*.spec.*'; then
            echo "::error::NEXT_PUBLIC_* env name suggesting a secret detected — these are baked into the public JS bundle."
            exit 1
          fi
          echo "no NEXT_PUBLIC_* secret-shaped env names found"

      - name: Build + push frontend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: ./src-fe
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://${{ env.PROD_DOMAIN }}/api/v1
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.input.outputs.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ steps.input.outputs.sha }}
            org.opencontainers.image.version=${{ steps.input.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ env.SUBMODULE_REPO }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Sync deploy bundle to VM
        # Push parent's scripts/deploy/* and docker-compose*.yml onto the VM
        # so /opt/folio/ always reflects parent master. Stage in a per-run
        # tempdir to avoid collisions with leftover root-owned files in /tmp
        # from prior provisioning.
        #
        # All `${{ ... }}` interpolations are bound into env vars first and
        # then referenced as shell `$VAR`s. See deploy-backend.yml for the
        # full rationale.
        env:
          STAGE_DIR: /tmp/folio-deploy-${{ github.run_id }}
        run: |
          set -e
          gcloud compute ssh "$VM_NAME" \
            --tunnel-through-iap --zone="$ZONE" --quiet \
            --command="rm -rf \"$STAGE_DIR\" && mkdir -p \"$STAGE_DIR\""
          gcloud compute scp \
            --tunnel-through-iap --zone="$ZONE" --quiet \
            scripts/deploy/deploy-runner.sh \
            scripts/deploy/wait-healthy.sh \
            scripts/deploy/rollback.sh \
            docker-compose.yml \
            docker-compose.prod.yml \
            "${VM_NAME}:${STAGE_DIR}/"
          gcloud compute ssh "$VM_NAME" \
            --tunnel-through-iap --zone="$ZONE" --quiet \
            --command="
              set -e
              sudo mkdir -p /opt/folio/scripts
              sudo install -o root -g root -m 755 \"$STAGE_DIR\"/deploy-runner.sh /opt/folio/scripts/deploy-runner.sh
              sudo install -o root -g root -m 755 \"$STAGE_DIR\"/wait-healthy.sh  /opt/folio/scripts/wait-healthy.sh
              sudo install -o root -g root -m 755 \"$STAGE_DIR\"/rollback.sh      /opt/folio/scripts/rollback.sh
              sudo install -o root -g root -m 644 \"$STAGE_DIR\"/docker-compose.yml      /opt/folio/docker-compose.yml
              sudo install -o root -g root -m 644 \"$STAGE_DIR\"/docker-compose.prod.yml /opt/folio/docker-compose.prod.yml
              rm -rf \"$STAGE_DIR\"
              echo 'deploy bundle synced:'
              ls -la /opt/folio/scripts/ /opt/folio/docker-compose*.yml
            "

      - name: Deploy on VM (deploy-runner.sh)
        env:
          SHA: ${{ steps.input.outputs.sha }}
        run: |
          gcloud compute ssh "$VM_NAME" \
            --tunnel-through-iap \
            --zone="$ZONE" \
            --quiet \
            --command="sudo /opt/folio/scripts/deploy-runner.sh \"$SHA\" frontend"

      - name: Purge Cloudflare edge cache
        # Required: /_next/static/* has 1-month edge TTL. Without purge, users
        # request stale chunk hashes and see white-screen 404s.
        run: |
          response=$(curl -fSs -X POST \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"hosts":["${{ env.PROD_DOMAIN }}"]}' \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache")
          echo "$response"
          echo "$response" | grep -q '"success":true' || { echo "::error::CF purge failed"; exit 1; }

      - name: Wait 30s for CF edge propagation
        # CF purge_cache is sync at the API level but POP-to-POP propagation
        # takes ~30s. Smoking sooner can hit a still-cached old response.
        run: sleep 30

      - name: Smoke / (assert 200 + Next.js marker)
        # `-L` follows the next-intl locale redirect (/ → /en or /fr).
        # Cache-bust + Next.js `_next/static` marker grep defeats CF custom
        # error pages and stale-cache false positives.
        run: |
          set -e
          for i in 1 2 3 4 5; do
            code=$(curl -fsSL -o /tmp/page.html -w '%{http_code}' --max-time 15 \
              -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' \
              "https://${{ env.PROD_DOMAIN }}/?_=$(date +%s)" || echo "000")
            if [ "$code" = "200" ] && grep -q '_next/static' /tmp/page.html; then
              echo "::notice::smoke ok (200, Next.js marker present)"
              exit 0
            fi
            echo "smoke try $i/5: code=$code marker=$(grep -c '_next/static' /tmp/page.html 2>/dev/null || echo 0)"
            sleep 5
          done
          echo "::error::smoke failed — / did not return 200 with Next.js marker after 5 tries"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Frontend deploy failed for v${{ steps.input.outputs.version }} (${{ steps.input.outputs.sha }})"
          echo "::error::Runbook: https://github.com/${{ github.repository }}/blob/master/docs/deployment-guide.md#41-site-down--first-5-minutes"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy Frontend — build"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | v${{ steps.input.outputs.version }} |"
            echo "| SHA | \`${{ steps.input.outputs.sha }}\` |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Image | \`${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.input.outputs.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  bump-pointer:
    # Runs ONLY after build+smoke succeed. Sole task is to write the submodule
    # pointer commit back to parent master — contains no untrusted-code path
    # that could touch the contents:write token.
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout parent (with write credentials)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Bump folio-front-end pointer in parent master
        # Writes the gitlink directly via update-index (no second clone needed,
        # so no cross-repo auth dance for the submodule remote). On race with
        # a human master push, retry fetch+rebase+push up to 3x with backoff.
        env:
          SHA: ${{ needs.build.outputs.sha }}
          VERSION: ${{ needs.build.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git update-index --add --cacheinfo "160000,${SHA},${SUBMODULE_PATH}"
          if git diff --cached --quiet; then
            echo "submodule pointer already at ${SHA} — nothing to commit"
            exit 0
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            commit_msg="chore(deploy): folio-front-end → ${SHA} [manual] [skip ci]"
          else
            commit_msg="chore(deploy): folio-front-end → ${SHA} (v${VERSION}) [skip ci]"
          fi
          git commit -m "$commit_msg"
          for i in 1 2 3; do
            git fetch origin master
            if ! git rebase origin/master; then
              git rebase --abort
              echo "::error::pointer-bump rebase failed onto origin/master"
              exit 1
            fi
            if git push origin HEAD:master; then
              echo "::notice::pointer commit pushed (try $i/3)"
              exit 0
            fi
            echo "push race on master, retrying ($i/3)"
            sleep $((i * 5))
          done
          echo "::error::failed to push pointer commit after 3 retries — deploy is live, parent master is stale"
          exit 1
