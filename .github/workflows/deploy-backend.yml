# Deploy backend (api + worker share image) to prod VM.
#
# Triggered by:
#   - repository_dispatch (event_type: deploy-api) from folio-back-end's
#     release job after it tags a new version.
#   - workflow_dispatch with explicit version + sha (manual fallback).
#
# Flow: checkout submodule@<sha> → buildx → push to AR (tag <sha> + latest)
#   → gcloud IAP SSH → /opt/folio/scripts/deploy-runner.sh <sha> api
#   → smoke /health → (separate job) commit submodule pointer bump on master.
#
# Permission model: the build job runs untrusted submodule source (post-install
# hooks, malicious Python wheels) inside docker buildx. It must NOT hold a
# token that can write to parent master. The build job's GITHUB_TOKEN is
# `contents: read` only. A separate bump-pointer job, gated by `needs: build`,
# holds `contents: write` and runs only after build+smoke succeed — its only
# step is the gitlink commit, so there's no untrusted code path that touches
# the write-scoped token.
#
# Plan: plans/260503-0913-parent-auto-deploy-on-version-bump/phase-01-...md
# Runbook: docs/deployment-guide.md §3.1, §4.1

name: Deploy Backend

on:
  repository_dispatch:
    types: [deploy-api]
  workflow_dispatch:
    inputs:
      version:
        description: "Backend version (e.g. 1.2.3)"
        required: true
        type: string
      sha:
        description: "folio-back-end commit SHA (7-40 hex)"
        required: true
        type: string

concurrency:
  group: deploy-prod-backend
  cancel-in-progress: false

env:
  PROJECT_ID: flowitup-folio-prod
  REGION: europe-west1
  AR_REPO: folio
  IMAGE_NAME: api
  VM_NAME: flowitup-folio-prod-1
  ZONE: europe-west1-b
  PROD_DOMAIN: folio.flowitup.com
  SUBMODULE_REPO: flowitup/folio-back-end
  SUBMODULE_PATH: folio-back-end

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Default-narrow: read-only on parent contents. The build step pulls
    # submodule source at an attacker-controlled SHA and runs it through
    # docker buildx; a build-time exfil of GITHUB_TOKEN therefore cannot
    # push to parent master. `id-token: write` is required by WIF (the OIDC
    # token is bound to this workflow run, not to repo contents).
    permissions:
      contents: read
      id-token: write
    outputs:
      sha: ${{ steps.input.outputs.sha }}
      version: ${{ steps.input.outputs.version }}
    steps:
      - name: Resolve inputs (dispatch vs manual)
        id: input
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            SHA="${{ github.event.client_payload.sha }}"
          else
            VERSION="${{ inputs.version }}"
            SHA="${{ inputs.sha }}"
          fi
          [[ "$SHA" =~ ^[0-9a-f]{7,40}$ ]] || { echo "::error::invalid sha '$SHA'"; exit 1; }
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::invalid version '$VERSION'"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::deploying api v$VERSION (sha $SHA)"

      - name: Checkout parent (for deploy scripts + compose files)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Build job is contents:read — no need to persist credentials in
          # the worktree (eliminates one exfil vector).
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout folio-back-end at SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ env.SUBMODULE_REPO }}
          ref: ${{ steps.input.outputs.sha }}
          path: src-be
          persist-credentials: false
          # SUBMODULE_TOKEN is REQUIRED when the sibling repo is private —
          # GITHUB_TOKEN cannot read other private repos in the org.
          token: ${{ secrets.SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
          # Fetch tags so the version<->sha verify step can check tag points-at.
          fetch-tags: true

      - name: Verify version↔sha tag
        # Resolve the tag via the GitHub REST API and ensure the version in
        # the payload actually points at the SHA being deployed. Runs on
        # BOTH triggers: a leaked `repository_dispatch` token could otherwise
        # invoke a deploy with an attacker-chosen SHA from any internal
        # branch (the SHA-regex allows any 7-40 hex string, including ones
        # that never made it to a signed release tag).
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${{ steps.input.outputs.version }}"
          SHA="${{ steps.input.outputs.sha }}"
          tag_sha=$(gh api "repos/${{ env.SUBMODULE_REPO }}/commits/v${VERSION}" --jq .sha 2>/dev/null || true)
          if [ -z "$tag_sha" ]; then
            echo "::error::tag v${VERSION} does not exist on ${{ env.SUBMODULE_REPO }}"
            exit 1
          fi
          if [ "$tag_sha" = "$SHA" ] || [[ "$SHA" == "$tag_sha"* ]] || [[ "$tag_sha" == "$SHA"* ]]; then
            echo "::notice::tag v${VERSION} points at ${SHA} ✓ (resolved $tag_sha)"
          else
            echo "::error::tag v${VERSION} points at ${tag_sha} but caller passed ${SHA}"
            exit 1
          fi

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          # Workload Identity Federation — keyless auth via GitHub OIDC token.
          # Org policy `iam.disableServiceAccountKeyCreation` blocks JSON keys.
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a  # v2.1.4

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.7.1

      - name: Build + push api image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355  # v6.10.0
        with:
          context: ./src-be
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.input.outputs.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ steps.input.outputs.sha }}
            org.opencontainers.image.version=${{ steps.input.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ env.SUBMODULE_REPO }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Sync deploy bundle to VM
        # Push parent's scripts/deploy/* and docker-compose*.yml onto the VM
        # so /opt/folio/ always reflects parent master. Stage in a per-run
        # tempdir to avoid collisions with leftover root-owned files in /tmp
        # from prior provisioning.
        #
        # All `${{ ... }}` interpolations are bound into env vars first and
        # then referenced as shell `$VAR`s inside `run:`. This pattern is
        # GitHub's own recommendation for `--command=` sinks: even if a
        # future PR adds a new dynamic value (e.g. branch name from the
        # dispatch payload) the value lands in a shell variable, never
        # textually concatenated into the workflow template.
        env:
          STAGE_DIR: /tmp/folio-deploy-${{ github.run_id }}
        run: |
          set -e
          # Pre-create the staging dir as the SSH user so scp can write to it.
          gcloud compute ssh "$VM_NAME" \
            --tunnel-through-iap --zone="$ZONE" --quiet \
            --command="rm -rf \"$STAGE_DIR\" && mkdir -p \"$STAGE_DIR\""
          gcloud compute scp \
            --tunnel-through-iap --zone="$ZONE" --quiet \
            scripts/deploy/deploy-runner.sh \
            scripts/deploy/wait-healthy.sh \
            scripts/deploy/rollback.sh \
            docker-compose.yml \
            docker-compose.prod.yml \
            "${VM_NAME}:${STAGE_DIR}/"
          gcloud compute ssh "$VM_NAME" \
            --tunnel-through-iap --zone="$ZONE" --quiet \
            --command="
              set -e
              sudo mkdir -p /opt/folio/scripts
              sudo install -o root -g root -m 755 \"$STAGE_DIR\"/deploy-runner.sh /opt/folio/scripts/deploy-runner.sh
              sudo install -o root -g root -m 755 \"$STAGE_DIR\"/wait-healthy.sh  /opt/folio/scripts/wait-healthy.sh
              sudo install -o root -g root -m 755 \"$STAGE_DIR\"/rollback.sh      /opt/folio/scripts/rollback.sh
              sudo install -o root -g root -m 644 \"$STAGE_DIR\"/docker-compose.yml      /opt/folio/docker-compose.yml
              sudo install -o root -g root -m 644 \"$STAGE_DIR\"/docker-compose.prod.yml /opt/folio/docker-compose.prod.yml
              rm -rf \"$STAGE_DIR\"
              echo 'deploy bundle synced:'
              ls -la /opt/folio/scripts/ /opt/folio/docker-compose*.yml
            "

      - name: Deploy on VM (deploy-runner.sh)
        # --quiet suppresses the first-run SSH-key generation prompt (would hang).
        # deploy-runner.sh handles: pull image → flask db upgrade → swap api+worker
        # with --no-deps → wait-healthy.
        #
        # SHA is bound via env, then referenced as "$SHA" in the remote
        # command. The remote shell sees a quoted argument — even if a
        # future regex widening accidentally allowed shell metachars,
        # they would land inside the quotes, not as a separate command.
        env:
          SHA: ${{ steps.input.outputs.sha }}
        run: |
          gcloud compute ssh "$VM_NAME" \
            --tunnel-through-iap \
            --zone="$ZONE" \
            --quiet \
            --command="sudo /opt/folio/scripts/deploy-runner.sh \"$SHA\" api"

      - name: Smoke /health (assert 200 + JSON shape)
        # Cache-bust via ?_=<epoch> to defeat any accidental CF page rule.
        # JSON-shape check defends against CF custom error pages that 200 with HTML.
        run: |
          set -e
          for i in 1 2 3 4 5; do
            code=$(curl -fsS -o /tmp/healthz.json -w '%{http_code}' --max-time 10 \
              -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' \
              "https://${{ env.PROD_DOMAIN }}/health?_=$(date +%s)" || echo "000")
            if [ "$code" = "200" ] && \
               jq -e '(.status == "ok") or (.ok == true) or (.healthy == true)' /tmp/healthz.json >/dev/null 2>&1; then
              echo "::notice::smoke ok (200, JSON ok) — $(cat /tmp/healthz.json)"
              exit 0
            fi
            echo "smoke try $i/5: code=$code body=$(head -c 200 /tmp/healthz.json 2>/dev/null || echo none)"
            sleep 5
          done
          echo "::error::smoke failed — /health did not return 200 with healthy JSON after 5 tries"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::API deploy failed for v${{ steps.input.outputs.version }} (${{ steps.input.outputs.sha }})"
          echo "::error::Runbook: https://github.com/${{ github.repository }}/blob/master/docs/deployment-guide.md#41-site-down--first-5-minutes"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy Backend — build"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | v${{ steps.input.outputs.version }} |"
            echo "| SHA | \`${{ steps.input.outputs.sha }}\` |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Image | \`${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.input.outputs.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  bump-pointer:
    # Runs ONLY after build+smoke succeed. Its sole task is to write the
    # submodule pointer commit back to parent master — so the `contents:write`
    # token is held by a job that contains no untrusted-code path. The build
    # job's potentially-malicious docker-build step has already completed and
    # released its (read-only) token before this job starts.
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout parent (with write credentials)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Bump folio-back-end pointer in parent master
        # Writes the gitlink directly via update-index (no second clone needed,
        # so no cross-repo auth dance for the submodule remote). On race with
        # a human master push, retry fetch+rebase+push up to 3x with backoff.
        env:
          SHA: ${{ needs.build.outputs.sha }}
          VERSION: ${{ needs.build.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git update-index --add --cacheinfo "160000,${SHA},${SUBMODULE_PATH}"
          if git diff --cached --quiet; then
            echo "submodule pointer already at ${SHA} — nothing to commit"
            exit 0
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            commit_msg="chore(deploy): folio-back-end → ${SHA} [manual] [skip ci]"
          else
            commit_msg="chore(deploy): folio-back-end → ${SHA} (v${VERSION}) [skip ci]"
          fi
          git commit -m "$commit_msg"
          for i in 1 2 3; do
            git fetch origin master
            if ! git rebase origin/master; then
              git rebase --abort
              echo "::error::pointer-bump rebase failed onto origin/master"
              exit 1
            fi
            if git push origin HEAD:master; then
              echo "::notice::pointer commit pushed (try $i/3)"
              exit 0
            fi
            echo "push race on master, retrying ($i/3)"
            sleep $((i * 5))
          done
          echo "::error::failed to push pointer commit after 3 retries — deploy is live, parent master is stale"
          exit 1
