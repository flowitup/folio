# Phase 5 — CI workflow for the BACK-END image (api + worker share this image).
# DEPLOYS to: folio-back-end/.github/workflows/deploy-api.yml
#
# This file lives in the monorepo as a TEMPLATE because folio-back-end is a
# git submodule whose root must hold the .github directory. Copy verbatim into
# the back-end repo when first wiring the pipeline.
#
# Required GitHub Secrets (in folio-back-end repo settings):
#   GCP_SA_KEY     — deploy-sa JSON key (from `bootstrap.sh --rotate-deploy-key`)
#   CF_API_TOKEN   — Cloudflare API token, zone-scoped, Cache Purge:Edit only
#   CF_ZONE_ID     — flowitup.com zone ID (CF dashboard → Overview → API → Zone ID)
# Note: NO DEPLOY_SSH_KEY — IAP authenticates via the SA, not an SSH key.

name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "app/**"
      - "src/**"
      - "scripts/**"
      - "alembic/**"
      - "migrations/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-prod-backend
  cancel-in-progress: false

env:
  PROJECT_ID: flowitup-folio-prod
  REGION: europe-west1
  AR_REPO: folio
  IMAGE_NAME: api
  VM_NAME: flowitup-folio-prod-1
  ZONE: europe-west1-b

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build + push image (SHA + latest tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via IAP tunnel (api + worker share image)
        # --quiet: suppress the "generate SSH key?" interactive prompt on first
        # run of a fresh ubuntu-latest runner (it'd hang the workflow forever).
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --tunnel-through-iap \
            --zone=${{ env.ZONE }} \
            --quiet \
            --command="/opt/folio/scripts/deploy-runner.sh ${{ github.sha }} api"

      - name: Notify on failure
        if: failure()
        run: echo "::error::API deploy failed for ${{ github.sha }} — check VM logs via IAP SSH"
