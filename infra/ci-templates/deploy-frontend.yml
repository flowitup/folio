# Phase 5 — CI workflow for the FRONT-END (Next.js) image.
# DEPLOYS to: folio-front-end/.github/workflows/deploy-frontend.yml
#
# Lives in monorepo as a TEMPLATE (folio-front-end is a submodule). Copy verbatim
# into the front-end repo when wiring the pipeline.
#
# Required GitHub Secrets (in folio-front-end repo settings):
#   GCP_SA_KEY     — deploy-sa JSON key
#   CF_API_TOKEN   — Cloudflare token, zone-scoped, Cache Purge:Edit only
#   CF_ZONE_ID     — flowitup.com zone ID
#
# Frontend builds are special: NEXT_PUBLIC_API_BASE_URL is BAKED at build time
# (Next.js inlines NEXT_PUBLIC_* into client bundles). After deploy the edge
# cache for /_next/static/* is purged so users don't 404 against the new build-id.

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "src/**"
      - "app/**"
      - "pages/**"
      - "components/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "next.config.*"
      - "tsconfig.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-prod-frontend
  cancel-in-progress: false

env:
  PROJECT_ID: flowitup-folio-prod
  REGION: europe-west1
  AR_REPO: folio
  IMAGE_NAME: frontend
  VM_NAME: flowitup-folio-prod-1
  ZONE: europe-west1-b
  PROD_DOMAIN: folio.flowitup.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://${{ env.PROD_DOMAIN }}/api/v1
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via IAP tunnel
        # --quiet: suppress the "generate SSH key?" interactive prompt on first
        # run of a fresh ubuntu-latest runner (it'd hang the workflow forever).
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --tunnel-through-iap \
            --zone=${{ env.ZONE }} \
            --quiet \
            --command="/opt/folio/scripts/deploy-runner.sh ${{ github.sha }} frontend"

      - name: Purge Cloudflare edge cache
        # Required: /_next/static/* has 1-month edge TTL. Without purge, users
        # request stale chunk hashes and see white-screen 404s.
        run: |
          curl -fSs -X POST \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"hosts":["${{ env.PROD_DOMAIN }}"]}' \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            | tee /tmp/cf-purge.json
          /usr/bin/grep -q '"success":true' /tmp/cf-purge.json

      - name: Notify on failure
        if: failure()
        run: echo "::error::Frontend deploy failed for ${{ github.sha }} — check VM logs + CF purge response"
